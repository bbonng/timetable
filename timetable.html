<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026년 1학기 수업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: transparent;
    padding: 8px;
  }
  table {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    border-collapse: separate;
    border-spacing: 3px;
    table-layout: fixed;
  }
  th {
    font-size: 12px;
    font-weight: 500;
    color: #666;
    text-align: center;
    padding: 6px 4px;
    background: #f5f5f3;
    border-radius: 6px;
  }
  td.period {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    font-weight: 500;
    background: #f5f5f3;
    border-radius: 6px;
    width: 28px;
    height: 44px;
  }
  td.cell {
    height: 44px;
    text-align: center;
    vertical-align: middle;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    background: #f5f5f3;
    color: #bbb;
  }
  td.cell.has-class {
    background: #E1F5EE;
    color: #085041;
    border: 1px solid #9FE1CB;
  }
  tr.lunch td {
    height: 20px;
    text-align: center;
    vertical-align: middle;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 500;
    color: #854F0B;
    background: #FAEEDA;
  }
  tr.lunch td.period-lunch {
    background: #f5f5f3;
    color: #ccc;
  }
</style>
</head>
<body>
<table>
  <thead>
    <tr>
      <th style="width:28px"></th>
      <th>월</th>
      <th>화</th>
      <th>수</th>
      <th>목</th>
      <th>금</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td class="period">1</td>
      <td class="cell"></td>
      <td class="cell has-class">2-10</td>
      <td class="cell"></td>
      <td class="cell"></td>
      <td class="cell"></td>
    </tr>
    <tr>
      <td class="period">2</td>
      <td class="cell"></td>
      <td class="cell has-class">2-7</td>
      <td class="cell has-class">2-6</td>
      <td class="cell has-class">2-4</td>
      <td class="cell"></td>
    </tr>
    <tr>
      <td class="period">3</td>
      <td class="cell has-class">2-8</td>
      <td class="cell has-class">2-11</td>
      <td class="cell"></td>
      <td class="cell has-class">2-9</td>
      <td class="cell has-class">2-3</td>
    </tr>
    <tr>
      <td class="period">4</td>
      <td class="cell has-class">2-1</td>
      <td class="cell"></td>
      <td class="cell has-class">2-5</td>
      <td class="cell"></td>
      <td class="cell"></td>
    </tr>
    <tr class="lunch">
      <td class="period-lunch"></td>
      <td colspan="5">점심시간</td>
    </tr>
    <tr>
      <td class="period">5</td>
      <td class="cell"></td>
      <td class="cell"></td>
      <td class="cell has-class">2-2</td>
      <td class="cell"></td>
      <td class="cell"></td>
    </tr>
    <tr>
      <td class="period">6</td>
      <td class="cell"></td>
      <td class="cell"></td>
      <td class="cell"></td>
      <td class="cell"></td>
      <td class="cell"></td>
    </tr>
    <tr>
      <td class="period">7</td>
      <td class="cell"></td>
      <td class="cell"></td>
      <td class="cell"></td>
      <td class="cell"></td>
      <td class="cell"></td>
    </tr>
  </tbody>
</table>
</body>
</html>
