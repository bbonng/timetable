
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  .timetable-wrap {
    font-family: 'Noto Sans KR', var(--font-sans), sans-serif;
    padding: 2rem 1rem;
  }
  .tt-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .tt-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--color-text-primary);
    letter-spacing: -0.5px;
  }
  .tt-sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-top: 4px;
  }
  .tt-accent {
    display: inline-block;
    width: 32px;
    height: 3px;
    background: #1D9E75;
    border-radius: 2px;
    margin: 8px auto 0;
  }
  table.tt {
    width: 100%;
    border-collapse: separate;
    border-spacing: 4px;
    table-layout: fixed;
  }
  table.tt th {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-secondary);
    text-align: center;
    padding: 8px 4px;
    background: var(--color-background-secondary);
    border-radius: 6px;
  }
  table.tt td.period {
    font-size: 12px;
    color: var(--color-text-tertiary);
    text-align: center;
    font-weight: 500;
    background: var(--color-background-secondary);
    border-radius: 6px;
    padding: 0;
    width: 36px;
  }
  table.tt td.cell {
    height: 52px;
    text-align: center;
    vertical-align: middle;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.15s;
    cursor: default;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-secondary);
  }
  table.tt td.cell.has-class {
    background: #E1F5EE;
    border: 0.5px solid #9FE1CB;
    color: #085041;
  }
  table.tt td.cell.has-class:hover {
    transform: scale(1.04);
    background: #9FE1CB;
  }
  table.tt td.cell.empty {
    background: var(--color-background-secondary);
    border: none;
  }
  tr.lunch-row td {
    height: 28px;
    text-align: center;
    vertical-align: middle;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    color: #854F0B;
    background: #FAEEDA;
    border: none;
  }
  tr.lunch-row td.period-lunch {
    background: var(--color-background-secondary);
    color: var(--color-text-tertiary);
    font-size: 11px;
  }
</style>
<div class="timetable-wrap">
  <div class="tt-header">
    <div class="tt-title">2026년 1학기 수업</div>
    <div class="tt-sub">대구일중학교 · 체육</div>
    <div class="tt-accent"></div>
  </div>
  <table class="tt">
    <thead>
      <tr>
        <th style="width:36px"></th>
        <th>월</th>
        <th>화</th>
        <th>수</th>
        <th>목</th>
        <th>금</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="period">1</td>
        <td class="cell empty"></td>
        <td class="cell has-class">2-10</td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
      </tr>
      <tr>
        <td class="period">2</td>
        <td class="cell empty"></td>
        <td class="cell has-class">2-7</td>
        <td class="cell has-class">2-6</td>
        <td class="cell has-class">2-4</td>
        <td class="cell empty"></td>
      </tr>
      <tr>
        <td class="period">3</td>
        <td class="cell has-class">2-8</td>
        <td class="cell has-class">2-11</td>
        <td class="cell empty"></td>
        <td class="cell has-class">2-9</td>
        <td class="cell has-class">2-3</td>
      </tr>
      <tr>
        <td class="period">4</td>
        <td class="cell has-class">2-1</td>
        <td class="cell empty"></td>
        <td class="cell has-class">2-5</td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
      </tr>
      <tr class="lunch-row">
        <td class="period-lunch"></td>
        <td colspan="5">점심시간</td>
      </tr>
      <tr>
        <td class="period">5</td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
        <td class="cell has-class">2-2</td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
      </tr>
      <tr>
        <td class="period">6</td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
      </tr>
      <tr>
        <td class="period">7</td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
        <td class="cell empty"></td>
      </tr>
    </tbody>
  </table>
</div>
